<div class="max-w-4xl mx-auto">
  <!-- Nút quay lại -->
  <button
    routerLink="/admin/users"
    class="mb-6 flex items-center text-gray-500 hover:text-[#2ac2d5] transition-colors"
  >
    <mat-icon class="me-1">arrow_back</mat-icon> Back to List
  </button>

  @if (user()) {
    <div class="bg-white rounded-3xl shadow-xl border border-gray-100 overflow-hidden">
      <!-- Cover Photo giả lập -->
      <div class="h-32 bg-gradient-to-r from-[#2ac2d5] to-[#2ab1d7]"></div>
      <div class="px-8 pb-8">
        <div class="relative flex justify-between items-end -mt-12 mb-6">
          <!-- Avatar -->
          <img
            [src]="user()?.email"
            class="w-32 h-32 rounded-3xl border-4 border-white shadow-lg object-cover"
            alt="User Avatar"
          />
          <!-- Badge Trạng thái -->
          <!-- <span
            [ngClass]="{
              'bg-emerald-100 text-emerald-700': user().status === 'Active',
              'bg-rose-100 text-rose-700': user().status === 'Inactive',
            }"
            class="px-4 py-1.5 rounded-full text-xs font-bold uppercase tracking-widest border border-white shadow-sm"
          >
            {{ user()?.username }}
          </span> -->
        </div>
        <!-- Thông tin chính -->
        <div class="border-b border-gray-100 pb-6 mb-6">
          <h1 class="text-3xl font-bold text-slate-800">{{ user()?.name }}</h1>
          <p class="text-gray-500 flex items-center mt-1">
            <mat-icon class="text me-1 scale-80">mail</mat-icon> {{ user()?.email }}
          </p>
        </div>
        <!-- Grid thông tin chi tiết -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
          <div class="space-y-4">
            <div>
              <span class="text-[11px] uppercase font-bold text-gray-400 tracking-widest"
                >Employee Phone</span
              >
              <p class="text-slate-700 font-semibold text-lg">{{ user()?.phone }}</p>
            </div>
            <div>
              <span class="text-[11px] uppercase font-bold text-gray-400 tracking-widest"
                >Internal ID</span
              >
              <p class="text-slate-600 font-mono">#{{ user()?.id }}</p>
            </div>
          </div>
          <div class="space-y-4">
            <div>
              <span class="text-[11px] uppercase font-bold text-gray-400 tracking-widest"
                >Company</span
              >
              <p class="text-slate-700 font-semibold">{{ user()?.company?.name }}</p>
            </div>
            <div>
              <span class="text-[11px] uppercase font-bold text-gray-400 tracking-widest"
                >Website</span
              >
              <p class="text-slate-700 font-semibold">
                {{ user()?.website }}
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>
  }

  <!-- Thông báo nếu không tìm thấy user -->
  @if (!user()) {
    <div class="text-center py-20 bg-white rounded-3xl border-2 border-dashed border-gray-200">
      <mat-icon class="text-gray-300 scale-[3]">person_off</mat-icon>
      <p class="mt-8 text-gray-500 font-medium">User not found or ID is invalid.</p>
    </div>
  }
</div>
