<div class="bg-white rounded-[24px] shadow-2xl overflow-hidden p-8 min-w-[400px]">
  <div class="flex items-center gap-4 mb-6">
    <div class="flex items-center justify-center w-12 h-12 rounded-xl bg-red-500/10 text-red-600">
      <mat-icon class="!text-[28px] !w-7 !h-7">delete_outline</mat-icon>
    </div>
    <h2 mat-dialog-title class="!m-0 !p-0 !text-xl !font-bold !text-slate-800 !border-none">
      {{ data.title || 'Xoá người dùng' }}
    </h2>
  </div>

  <div class="mb-8">
    <p class="text-slate-500 text-[15px] leading-relaxed">
      {{ data.message || 'Hành động này không thể hoàn tác. Bạn có chắc chắn muốn tiếp tục?' }}
    </p>
  </div>

  <div class="flex justify-end gap-3">
    <button
      mat-button
      [mat-dialog-close]="false"
      class="!px-6 !py-2.5 !text-sm !font-semibold !text-slate-500 hover:!bg-slate-100 !rounded-xl transition-all"
    >
      Huỷ
    </button>

    <button
      mat-raised-button
      [mat-dialog-close]="true"
      class="!px-6 !py-2.5 !text-sm !font-bold !bg-red-600 !text-white !rounded-xl !shadow-[0_8px_20px_-6px_rgba(220,38,38,0.4)] hover:!bg-red-700 active:scale-95 transition-all"
    >
      Xác nhận xóa
    </button>
  </div>
</div>
