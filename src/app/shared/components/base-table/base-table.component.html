<div class="overflow-hidden bg-white rounded-2xl shadow-sm border border-slate-100">
  <table mat-table [dataSource]="paginatedData()" class="w-full">
    @for (col of columns; track col) {
      <ng-container [matColumnDef]="col.key">
        <th mat-header-cell *matHeaderCellDef class="!bg-slate-50 !text-slate-600 !font-bold !py-4">
          {{ col.label }}
        </th>
        <td mat-cell *matCellDef="let element" class="!py-4">
          @if (col.isAction) {
            <div class="flex gap-2">
              @if (col.buttons?.includes('view')) {
                <button mat-icon-button (click)="view.emit(element)">
                  <mat-icon>visibility</mat-icon>
                </button>
              }
              @if (col.buttons?.includes('edit')) {
                <button mat-icon-button (click)="edit.emit(element)">
                  <mat-icon>edit</mat-icon>
                </button>
              }
              @if (col.buttons?.includes('delete')) {
                <button mat-icon-button (click)="delete.emit(element)">
                  <mat-icon>delete</mat-icon>
                </button>
              }
            </div>
          } @else {
            <span class="text-slate-600">{{ getCellValue(element, col.key) }}</span>
          }
        </td>
      </ng-container>
    }

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr
      mat-row
      *matRowDef="let row; columns: displayedColumns"
      class="hover:bg-slate-50 transition-colors cursor-pointer"
    ></tr>
  </table>
</div>
<app-pagination
  [currentPage]="currentPage()"
  [totalPages]="totalPages()"
  [pageSize]="pageSize()"
  (pageChange)="onPageChange($event)"
  (pageSizeChange)="onSizeChange($event)"
>
</app-pagination>
