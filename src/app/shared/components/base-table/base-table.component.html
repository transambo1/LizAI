<div class="overflow-hidden bg-white rounded-2xl shadow-sm border border-slate-100">
  <table mat-table [dataSource]="paginatedData()" class="w-full">
    <ng-container *ngFor="let col of columns" [matColumnDef]="col.key">
      <th mat-header-cell *matHeaderCellDef class="!bg-slate-50 !text-slate-600 !font-bold !py-4">
        {{ col.label }}
      </th>

      <td mat-cell *matCellDef="let element" class="!py-4">
        <div *ngIf="col.isAction; else dataCell" class="flex gap-2">
          <button mat-icon-button color="primary" (click)="view.emit(element)">
            <mat-icon>visibility</mat-icon>
          </button>
          <button mat-icon-button color="accent" (click)="edit.emit(element)">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="delete.emit(element)">
            <mat-icon>delete</mat-icon>
          </button>
        </div>

        <ng-template #dataCell>
          <span class="text-slate-600">{{ getCellValue(element, col.key) }}</span>
        </ng-template>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr
      mat-row
      *matRowDef="let row; columns: displayedColumns"
      class="hover:bg-slate-50 transition-colors cursor-pointer"
    ></tr>
  </table>
</div>
<app-pagination
  [currentPage]="currentPage()"
  [totalPages]="totalPages()"
  [pageSize]="pageSize()"
  (pageChange)="onPageChange($event)"
  (pageSizeChange)="onSizeChange($event)"
>
</app-pagination>
