<div
  class="flex items-center justify-between px-6 py-3 bg-slate-50 border-t border-slate-100 rounded-b-2xl"
>
  <div class="flex items-center gap-2">
    <span class="text-xs font-semibold text-slate-500 uppercase">Hiển thị:</span>
    <div class="flex bg-white border border-slate-200 rounded-lg p-1 shadow-sm">
      @for (size of sizeOptions; track size) {
        <button
          (click)="onSizeChange(size)"
          [class]="
            pageSize === size
              ? 'bg-[#2ac2d5] text-white px-3 py-1 rounded-md text-xs font-bold'
              : 'px-3 py-1 text-xs text-slate-600 hover:bg-slate-50'
          "
        >
          {{ size }}
        </button>
      }
    </div>
  </div>

  <div class="flex items-center gap-4">
    <span class="text-sm text-slate-500 font-medium"
      >Page {{ currentPage }} / {{ totalPages }}</span
    >
    <div class="flex gap-2">
      <button
        mat-icon-button
        (click)="goToPage(currentPage - 1)"
        [disabled]="currentPage === 1"
        class="border border-slate-200 !bg-white"
      >
        <mat-icon>chevron_left</mat-icon>
      </button>
      <button
        mat-icon-button
        (click)="goToPage(currentPage + 1)"
        [disabled]="currentPage === totalPages"
        class="border border-slate-200 !bg-white"
      >
        <mat-icon>chevron_right</mat-icon>
      </button>
    </div>
  </div>
</div>
